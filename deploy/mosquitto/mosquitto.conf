# Local MQTT broker for MavSphere sensor nodes.
#
# Plain TCP on port 1883. No authentication required — this broker
# is only reachable on the local network (LAN), never from the internet.
#
# ESP32 sensor nodes connect to: tcp://<machine-ip>:1883
# The layout agent connects to:  tcp://mosquitto:1883  (internal Docker network)

listener 1883
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
