name: Build & Push Layout Agent

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Optional friendly tag prefix. Leave blank to derive from branch name + commit hash.'
        required: false
        default: ''
      push_latest:
        description: 'Also push the :latest tag. Use false for feature testing.'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build & Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute build metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::7}"

          RAW_REF="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.image_tag }}" ]; then
            RAW_REF="${{ inputs.image_tag }}"
          fi

          SAFE_REF="$(echo "${RAW_REF}" | tr '/:@ ' '----' | tr -cd 'A-Za-z0-9_.-')"
          if [ -z "${SAFE_REF}" ]; then
            SAFE_REF="manual"
          fi

          echo "SHA=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "SHORT_SHA=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "REF_NAME=${SAFE_REF}" >> "${GITHUB_OUTPUT}"
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

      - name: Compute Docker tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="ghcr.io/mavsphere/layout-agent"
          TAGS="${IMAGE}:${{ steps.meta.outputs.REF_NAME }}-${{ steps.meta.outputs.SHORT_SHA }}"
          TAGS="${TAGS}"$'\n'"${IMAGE}:sha-${{ steps.meta.outputs.SHA }}"

          if [ "${{ github.event_name }}" != "workflow_dispatch" ] || [ "${{ inputs.push_latest }}" = "true" ]; then
            TAGS="${IMAGE}:latest"$'\n'"${TAGS}"
          fi

          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

          echo "Docker tags:"
          echo "${TAGS}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Layout Agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/mavsphere/mavsphere-layout-agent
            org.opencontainers.image.revision=${{ steps.meta.outputs.SHA }}
            org.opencontainers.image.version=${{ steps.meta.outputs.REF_NAME }}
            org.opencontainers.image.created=${{ steps.meta.outputs.BUILD_DATE }}
          build-args: |
            BASE_IMAGE=ghcr.io/mavsphere/layout-agent-base:latest
            BUILD_SHA=${{ steps.meta.outputs.SHA }}
            BUILD_REF=${{ steps.meta.outputs.REF_NAME }}
            BUILD_DATE=${{ steps.meta.outputs.BUILD_DATE }}
            BUILD_REPO=mavsphere/mavsphere-layout-agent
          cache-from: type=gha
          cache-to: type=gha,mode=max
