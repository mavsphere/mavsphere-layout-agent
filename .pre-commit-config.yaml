repos:
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: bash -c 'unformatted=$(gofmt -l .); if [ -n "$unformatted" ]; then echo "Not gofmt formatted:"; echo "$unformatted"; exit 1; fi'
        language: system
        pass_filenames: false
        types: [go]

      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        pass_filenames: false
        types: [go]

      - id: go-build
        name: go build
        entry: go build ./...
        language: system
        pass_filenames: false
        types: [go]

      - id: go-test
        name: go test
        entry: go test ./...
        language: system
        pass_filenames: false
        types: [go]

      - id: no-secrets
        name: block likely credentials
        entry: 'rtsp://[^/\s]*:[^/\s]*@|AKIA[0-9A-Z]{16}|-----BEGIN (RSA|EC|OPENSSH|DSA) PRIVATE KEY-----'
        language: pygrep
        types: [text]
